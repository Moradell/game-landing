<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Landing</title>
  <link rel="stylesheet" href="./css/main.css">
</head>

<body>
  <div class="wrapper">
    <section class="main-page">
      <div class="conteiner main-page__container">
        <header class="header">
          <div class="logo">
            <a href="#" class="logo__link">
              <img src="./img/logo.png" alt="#" class="logo__img">
            </a>
          </div>
          <div class="menu">
            <ul class="menu__list">
              <li class="menu__item">main</li>
              <li class="menu__item">about</li>
              <li class="menu__item">game features</li>
              <li class="menu__item">System requirements</li>
              <li class="menu__item">quotes</li>
            </ul>
          </div>
          <div class="store">
            <ul class="store__list">
              <li class="store__item">
                <a href="#" class="store__xbox">
                  <img src="./img/xbox.svg" alt="xbox" class="store__xbox-img">
                </a>
              </li>
              <li class="store__item">
                <a href="#" class="store__steam">
                  <img src="./img/steam.svg" alt="xbox" class="store__steam-img">
                </a>
              </li>
            </ul>
          </div>
        </header>
        <div class="hero">
          <div class="hero__title">
            <h1>survive at all costs</h1>
          </div>
          <div class="hero__subtitle">
            <p>Experience new social battle royale game</p>
          </div>
          <a href="#" class="button">Buy now on Steam <div class="sep"></div> $14.99</a>
        </div>
        <div class="scroll">
          <div class="scroll__title">The story</div>
        </div>
      </div>
    </section>
  </div>
</body>

</html>
